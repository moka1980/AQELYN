name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aqelyn
          POSTGRES_PASSWORD: aqelyn
          POSTGRES_DB: aqelyn
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aqelyn"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      AQELYN_ENV: ci
      AQELYN_TENANT_MODE: local
      AQELYN_BACKEND: postgres
      AQELYN_DATABASE_URL: postgresql+asyncpg://aqelyn:aqelyn@localhost:5432/aqelyn
      AQELYN_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check src tests
      - name: Ruff (format check)
        run: ruff format --check src tests
      - name: Mypy (strict)
        run: mypy
      - name: Pytest
        run: pytest
