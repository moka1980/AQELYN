# C-001 local infrastructure.
#   docker compose up                 -> Postgres + Redis only (default)
#   docker compose --profile full up  -> also builds & runs the AQELYN app
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aqelyn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aqelyn}
      POSTGRES_DB: ${POSTGRES_DB:-aqelyn}
    ports:
      - "5432:5432"
    volumes:
      - aqelyn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aqelyn}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: ["full"]
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

volumes:
  aqelyn_pgdata:
